# Demo local del POS con PARIDAD dev/prod: un solo contenedor autocontenido
# (Apache+PHP+MariaDB), la MISMA imagen que se despliega en Render.
# Levantar:  docker compose up --build   →   http://localhost:8080/index.php
# La base se siembra sola al arrancar (database.sql + demo-seed.sql).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PORT: 80            # en local Apache escucha en 80 (Render inyecta su propio PORT)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:80/index.php"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 45s
